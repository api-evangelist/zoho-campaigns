aid: zoho-campaigns
name: Zoho Campaigns
description: >-
  Zoho Campaigns is an email marketing platform with a REST API for managing
  mailing lists, campaigns, subscribers, email templates, A/B tests, and
  campaign analytics. The API (v1.1) uses OAuth 2.0 authentication and supports
  JSON and XML response formats, enabling developers to create, schedule, send,
  and report on email campaigns programmatically.
